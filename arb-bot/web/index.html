<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XAU MT4 Binance Arb</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3f8;
        color: #162033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eef3f8;
      }

      main {
        width: min(1440px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 20px 0 28px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 0 18px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 750;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 15px;
        font-weight: 750;
      }

      .sub {
        margin: 5px 0 0;
        color: #5c6b82;
        font-size: 13px;
      }

      .toolbar,
      .panel {
        background: #ffffff;
        border: 1px solid #d8e1ec;
        border-radius: 8px;
        box-shadow: 0 1px 2px rgba(24, 39, 75, 0.04);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(360px, 0.65fr);
        gap: 12px;
      }

      .panel {
        padding: 14px;
      }

      .metric {
        min-height: 82px;
        padding: 12px;
      }

      .label {
        color: #65748b;
        font-size: 12px;
        line-height: 1.3;
      }

      .value {
        margin-top: 8px;
        font-size: 21px;
        font-weight: 760;
        color: #111827;
        word-break: break-word;
      }

      .small {
        margin-top: 5px;
        color: #64748b;
        font-size: 12px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #e7edf5;
        color: #344256;
      }

      .status::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #8a98aa;
      }

      .status.ok {
        background: #e8f7ef;
        color: #067647;
      }

      .status.ok::before {
        background: #10b981;
      }

      .status.warn {
        background: #fff3d6;
        color: #9a5b00;
      }

      .status.warn::before {
        background: #f59e0b;
      }

      .status.bad {
        background: #fdebea;
        color: #b42318;
      }

      .status.bad::before {
        background: #ef4444;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th,
      td {
        padding: 9px 8px;
        border-bottom: 1px solid #e5edf5;
        text-align: left;
        white-space: nowrap;
      }

      th {
        color: #607086;
        font-size: 12px;
        font-weight: 700;
        background: #f5f8fb;
      }

      input {
        width: 100%;
        height: 38px;
        border: 1px solid #c8d5e3;
        border-radius: 6px;
        padding: 0 10px;
        color: #152033;
        background: #ffffff;
        font-size: 14px;
      }

      button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        padding: 0 12px;
        background: #1f66d1;
        color: #ffffff;
        font-size: 13px;
        font-weight: 750;
        cursor: pointer;
      }

      button.secondary {
        background: #344256;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .log {
        min-height: 64px;
        max-height: 180px;
        overflow: auto;
        padding: 10px;
        border-radius: 6px;
        background: #101827;
        color: #dbeafe;
        font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .mt {
        margin-top: 12px;
      }

      @media (max-width: 1040px) {
        .grid,
        .layout {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 20px, 680px);
        }

        header,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid,
        .layout,
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>MT4 XAUUSD / Binance Gold Arb</h1>
          <p class="sub" id="subtitle">正在连接执行器...</p>
        </div>
        <div class="toolbar">
          <span class="status warn" id="mode">DRY-RUN</span>
          <span class="status bad" id="backend">后端未连接</span>
          <span class="status bad" id="mt4">MT4 未连接</span>
          <button class="secondary" id="refreshBtn">刷新</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel metric">
          <div class="label">状态机</div>
          <div class="value" id="state">-</div>
          <div class="small" id="lastError">-</div>
        </div>
        <div class="panel metric">
          <div class="label">Binance</div>
          <div class="value" id="binanceQuote">-</div>
          <div class="small" id="binanceMeta">-</div>
        </div>
        <div class="panel metric">
          <div class="label">MT4</div>
          <div class="value" id="mt4Quote">-</div>
          <div class="small" id="mt4Meta">-</div>
        </div>
        <div class="panel metric">
          <div class="label">Maker Fee</div>
          <div class="value" id="makerFee">-</div>
          <div class="small" id="pairInfo">-</div>
        </div>
      </section>

      <section class="layout mt">
        <div class="stack">
          <div class="panel">
            <h2>实时快照</h2>
            <table>
              <thead>
                <tr>
                  <th>项目</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>更新时间</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Binance</td>
                  <td id="bBid">-</td>
                  <td id="bAsk">-</td>
                  <td id="bAge">-</td>
                </tr>
                <tr>
                  <td>MT4</td>
                  <td id="mBid">-</td>
                  <td id="mAsk">-</td>
                  <td id="mAge">-</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="panel">
            <h2>当前持仓</h2>
            <table>
              <thead>
                <tr>
                  <th>方向</th>
                  <th>数量 oz</th>
                  <th>Binance 开仓</th>
                  <th>MT4 开仓</th>
                  <th>Pair ID</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td id="pairDirection">-</td>
                  <td id="pairQty">-</td>
                  <td id="pairBinance">-</td>
                  <td id="pairMt4">-</td>
                  <td id="pairId">-</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="panel">
            <h2>事件</h2>
            <div class="log" id="log">ready</div>
          </div>
        </div>

        <aside class="stack">
          <div class="panel">
            <h2>Dry-run 行情</h2>
            <div class="form-grid">
              <label>
                <span class="label">Binance Bid</span>
                <input id="paperBid" value="2001" inputmode="decimal" />
              </label>
              <label>
                <span class="label">Binance Ask</span>
                <input id="paperAsk" value="2002" inputmode="decimal" />
              </label>
              <label>
                <span class="label">MT4 Bid</span>
                <input id="mt4Bid" value="1999" inputmode="decimal" />
              </label>
              <label>
                <span class="label">MT4 Ask</span>
                <input id="mt4Ask" value="2000" inputmode="decimal" />
              </label>
            </div>
            <div class="actions">
              <button id="sendPaperBtn">推送行情</button>
              <button class="secondary" id="resumeBtn">恢复</button>
            </div>
          </div>

          <div class="panel">
            <h2>MT4 命令</h2>
            <table>
              <tbody>
                <tr>
                  <th>Action</th>
                  <td id="cmdAction">-</td>
                </tr>
                <tr>
                  <th>Lots</th>
                  <td id="cmdLots">-</td>
                </tr>
                <tr>
                  <th>Price Limit</th>
                  <td id="cmdLimit">-</td>
                </tr>
              </tbody>
            </table>
            <div class="actions">
              <button id="pollCmdBtn">拉取命令</button>
              <button class="secondary" id="reportOkBtn">回报成功</button>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      let lastCommand = null;

      function api(path, options = {}) {
        return fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            ...(options.headers || {}),
          },
        }).then(async (response) => {
          const text = await response.text();
          const body = text ? JSON.parse(text) : {};
          if (!response.ok) throw new Error(body.detail || `${response.status}`);
          return body;
        });
      }

      function fmt(value) {
        if (value === null || value === undefined || value === "") return "-";
        const n = Number(value);
        if (!Number.isFinite(n)) return String(value);
        return n.toLocaleString("en-US", { maximumFractionDigits: 6 });
      }

      function age(ts) {
        if (!ts) return "-";
        const diff = Date.now() - Number(ts);
        if (diff < 0) return "0ms";
        if (diff < 1000) return `${diff}ms`;
        return `${(diff / 1000).toFixed(1)}s`;
      }

      function setStatus(el, text, cls) {
        el.className = `status ${cls}`;
        el.textContent = text;
      }

      function appendLog(message) {
        const line = `[${new Date().toLocaleTimeString("zh-CN")}] ${message}`;
        $("log").textContent = `${line}\n${$("log").textContent}`.slice(0, 4000);
      }

      async function loadStatus() {
        try {
          const data = await api("status");
          render(data);
          setStatus($("backend"), "后端已连接", "ok");
        } catch (error) {
          setStatus($("backend"), "后端异常", "bad");
          appendLog(`status failed: ${error.message}`);
        }
      }

      function render(data) {
        const modeText = data.paper_mode || !data.live_trading ? "DRY-RUN" : "LIVE";
        setStatus($("mode"), modeText, modeText === "LIVE" ? "bad" : "warn");
        setStatus($("mt4"), data.mt4_connected ? "MT4 已连接" : "MT4 未连接", data.mt4_connected ? "ok" : "bad");
        $("subtitle").textContent = `${data.binance_symbol} / ${data.mt4_symbol}`;
        $("state").textContent = data.state || "-";
        $("lastError").textContent = data.last_error || "无异常";
        $("makerFee").textContent = data.maker_fee_rate ? `${fmt(Number(data.maker_fee_rate) * 100)}%` : "-";
        $("pairInfo").textContent = `${data.binance_symbol} / ${data.mt4_symbol}`;

        const b = data.binance_quote;
        const m = data.mt4_quote;
        $("binanceQuote").textContent = b ? `${fmt(b.bid)} / ${fmt(b.ask)}` : "-";
        $("mt4Quote").textContent = m ? `${fmt(m.bid)} / ${fmt(m.ask)}` : "-";
        $("binanceMeta").textContent = b ? `age ${age(b.timestamp_ms)}` : "等待报价";
        $("mt4Meta").textContent = m ? `age ${age(m.timestamp_ms)}` : "等待报价";
        $("bBid").textContent = b ? fmt(b.bid) : "-";
        $("bAsk").textContent = b ? fmt(b.ask) : "-";
        $("bAge").textContent = b ? age(b.timestamp_ms) : "-";
        $("mBid").textContent = m ? fmt(m.bid) : "-";
        $("mAsk").textContent = m ? fmt(m.ask) : "-";
        $("mAge").textContent = m ? age(m.timestamp_ms) : "-";

        const pair = data.open_pair;
        $("pairDirection").textContent = pair?.direction || "-";
        $("pairQty").textContent = pair ? fmt(pair.quantity_oz) : "-";
        $("pairBinance").textContent = pair ? fmt(pair.binance_entry_price) : "-";
        $("pairMt4").textContent = pair ? fmt(pair.mt4_entry_price) : "-";
        $("pairId").textContent = pair?.pair_id || "-";
      }

      async function sendPaperQuotes() {
        await api(`paper/binance/book?bid=${encodeURIComponent($("paperBid").value)}&ask=${encodeURIComponent($("paperAsk").value)}`, { method: "POST" });
        await api("mt4/tick", {
          method: "POST",
          body: JSON.stringify({
            symbol: "XAUUSD",
            bid: $("mt4Bid").value,
            ask: $("mt4Ask").value,
            positions: [],
          }),
        });
        appendLog("paper quotes sent");
        await loadStatus();
      }

      async function pollCommand() {
        const command = await api("mt4/command");
        lastCommand = command.command === "NONE" ? null : command;
        $("cmdAction").textContent = lastCommand?.action || "-";
        $("cmdLots").textContent = lastCommand?.lots || "-";
        $("cmdLimit").textContent = lastCommand ? (lastCommand.max_price || lastCommand.min_price || "-") : "-";
        appendLog(lastCommand ? `command ${lastCommand.action} lots=${lastCommand.lots}` : "no MT4 command");
      }

      async function reportOk() {
        if (!lastCommand) {
          appendLog("no command to report");
          return;
        }
        const fill = lastCommand.action === "BUY" ? $("mt4Ask").value : $("mt4Bid").value;
        await api("mt4/report", {
          method: "POST",
          body: JSON.stringify({
            command_id: lastCommand.command_id,
            status: "ok",
            action: lastCommand.action,
            ticket: Math.floor(Date.now() / 1000),
            fill_price: fill,
            lots: lastCommand.lots,
          }),
        });
        appendLog(`reported ${lastCommand.action} ok`);
        lastCommand = null;
        await loadStatus();
      }

      $("refreshBtn").addEventListener("click", loadStatus);
      $("sendPaperBtn").addEventListener("click", () => sendPaperQuotes().catch((error) => appendLog(error.message)));
      $("pollCmdBtn").addEventListener("click", () => pollCommand().catch((error) => appendLog(error.message)));
      $("reportOkBtn").addEventListener("click", () => reportOk().catch((error) => appendLog(error.message)));
      $("resumeBtn").addEventListener("click", () => api("control/resume", { method: "POST" }).then(loadStatus).catch((error) => appendLog(error.message)));
      loadStatus();
      setInterval(loadStatus, 1000);
    </script>
  </body>
</html>
