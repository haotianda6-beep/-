server {
    listen 80;
    listen [::]:80;
    server_name alpha.redzhong.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/redzhong.top;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alpha.redzhong.top;

    root /var/www/alpha.redzhong.top;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/alpha.redzhong.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alpha.redzhong.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    auth_basic "Alpha Alert";
    auth_basic_user_file /etc/nginx/.alpha-alert.htpasswd;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location = /api/alpha-alert/summary {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
