server {
    listen 80;
    listen [::]:80;
    server_name alpha.redzhong.top;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/redzhong.top;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}

