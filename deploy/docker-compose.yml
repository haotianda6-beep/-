services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perp_arb
      POSTGRES_USER: perp_arb
      POSTGRES_PASSWORD: change-me-local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:

